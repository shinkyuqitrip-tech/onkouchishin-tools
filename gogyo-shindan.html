<!DOCTYPE html>
<html lang="ja">
<head>
<!--
  ============================================================
  温考知身「わたしの体質と、ツボの地図。」 v7
  ・v7：中身（文言・データ・診断ロジック）は v6 から無変更。
    「FX layer」という演出専用のCSS／JSを末尾に追加しています。
    演出を外したいときは、スタイル末尾の「FX layer」ブロックと、
    いちばん最後のスクリプトブロック（FX layer）を
    丸ごと削除すれば v6 相当に戻ります。
  ============================================================
  ▼ STUDIOサイトへの組み込みかた
    1) このファイルを1枚そのままホスティングする
       （GitHub Pages / Netlify / Cloudflare Pages などの無料枠でOK）
    2) STUDIOのエディタで「iframe（埋め込み）」ボックスを配置し、
       次のコードを貼りつける
       <iframe src="https://＜公開したURL＞"
         style="width:100%;height:920px;border:0;border-radius:16px;"
         loading="lazy" title="わたしの体質と、ツボの地図"></iframe>
       ・高さは 850〜1000px あたりが目安（iframeの内側でスクロールします）
    3) からだの図をいったん非表示にしたいとき
       → スクリプト冒頭の「const SHOW_FIG = true;」を false に変えるだけ
    4) イラスト素材が用意できたら
       → VIEWS の各ビュー（SVG）を画像に差し替えられる設計です。
         素材が揃った段階でご相談ください。
  ============================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>わたしの五行タイプと、ツボの地図｜温考知身</title>
<meta property="og:title" content="わたしの五行タイプ｜温考知身">
<meta property="og:description" content="30の問いに答えるだけ。東洋医学の陰陽五行から、あなたの体質タイプ・性格・整えかた、そして五行の相生相剋でわかる相性まで。">
<meta property="og:type" content="website">
<meta property="og:url" content="https://onkouchishin.life/">
<meta property="og:image" content="https://onkouchishin.life/ogp-gogyo.png">
<meta name="twitter:card" content="summary_large_image">
<!-- og:image / og:url は公開時に実在するURLへ差し替えてください（画像は1200x630推奨） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --washi:#ffffff;
  --washi-deep:#fbe4d0;
  --card:#ffffff;
  --ink:#2b241d;
  --ink-soft:#7a6f5c;
  --line:#f1dcc3;
  --ember:#ff5a36;
  --ember-soft:#ffd9c4;
  --moku:#56a278;
  --tsuchi:#b1552f;
  --kin:#dcb051;
  --mizu:#5a96b1;
  --radius:22px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth;}
body{
  font-family:'Zen Maru Gothic',sans-serif;
  color:var(--ink);
  background-color:var(--washi);
  background-image:radial-gradient(rgba(43,36,29,.05) 1px, transparent 1px);
  background-size:22px 22px;
  line-height:1.8;
  font-size:15px;
}
body::before{
  content:"";display:block;height:10px;width:100%;
  background:linear-gradient(90deg,var(--moku),var(--tsuchi),var(--kin),var(--mizu));
  box-shadow:0 3px 10px rgba(43,36,29,.18);
}
.wrap{max-width:720px;margin:0 auto;padding:36px 18px 64px;}
.serif{font-family:'Shippori Mincho',serif;}

/* ---------- header ---------- */
.eyebrow{
  display:flex;align-items:center;gap:10px;
  font-size:12px;letter-spacing:.28em;color:var(--ink-soft);
  margin-bottom:14px;
}
.eyebrow::before,.eyebrow::after{content:"";height:1px;background:var(--line);flex:0 0 28px;}
.eyebrow::after{flex:1;}
h1{
  font-family:'Shippori Mincho',serif;
  font-size:clamp(24px,5.6vw,32px);
  font-weight:600;letter-spacing:.06em;line-height:1.5;
  margin-bottom:12px;
}
.lead{font-size:14px;color:var(--ink-soft);max-width:34em;margin-bottom:26px;}

/* ---------- mode nav ---------- */
.mode-nav{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
  background:var(--washi-deep);border:1px solid var(--line);
  border-radius:999px;padding:6px;margin-bottom:34px;
}
.mode-nav button{
  appearance:none;border:0;background:transparent;cursor:pointer;
  font-family:inherit;font-size:14px;font-weight:700;color:var(--ink-soft);
  padding:11px 8px;border-radius:999px;letter-spacing:.08em;
  transition:background .25s,color .25s;
}
.mode-nav button .sub{display:block;font-size:10px;font-weight:500;letter-spacing:.14em;opacity:.75;}
.mode-nav button.on{background:var(--ember);color:#fff;}
.mode-nav button:focus-visible{outline:2px solid var(--ember);outline-offset:2px;}

section[hidden]{display:none;}

/* ---------- shared ---------- */
.card{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:26px 22px;
  box-shadow:0 2px 0 rgba(43,36,29,.05);
}
.btn{
  appearance:none;border:0;cursor:pointer;font-family:inherit;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  background:var(--ember);color:#fff;
  font-size:15px;font-weight:700;letter-spacing:.12em;
  padding:14px 34px;border-radius:999px;
  box-shadow:0 6px 0 rgba(43,36,29,.12);
  transition:transform .15s,box-shadow .15s,opacity .2s;
}
.btn:hover{opacity:.94;transform:translateY(-3px);box-shadow:0 9px 0 rgba(43,36,29,.14);}
.btn:active{transform:translateY(0) scale(.97);box-shadow:0 3px 0 rgba(43,36,29,.12);}
.btn:focus-visible{outline:2px solid var(--ember);outline-offset:3px;}
.btn.ghost{background:transparent;color:var(--mizu);border:2px solid var(--mizu);box-shadow:none;}
.btn.ghost:hover{background:rgba(90,150,177,.08);transform:translateY(-3px);box-shadow:none;}
.btn.small{font-size:12.5px;padding:9px 20px;}
.note{font-size:12px;color:var(--ink-soft);line-height:1.9;}
.fade-in{animation:fadeIn .35s ease both;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* ---------- gogyo intro ring ---------- */
.gogyo-ring{display:flex;justify-content:center;gap:14px;margin:6px 0 20px;flex-wrap:wrap;}
.gogyo-ring .g{
  width:58px;height:58px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-size:24px;font-weight:600;color:#fff;
  position:relative;box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
}
.gogyo-ring .g small{
  position:absolute;bottom:-22px;left:50%;transform:translateX(-50%);
  font-family:'Zen Maru Gothic',sans-serif;font-size:10px;color:var(--ink-soft);
  letter-spacing:.1em;white-space:nowrap;
}

/* ---------- gogyo list（スタート画面のタイプ一覧） ---------- */
.gogyo-list{display:grid;gap:9px;margin:4px 0 16px;}
.gl-row{
  appearance:none;cursor:pointer;font-family:inherit;text-align:left;
  background:var(--washi);border:1.5px solid var(--line);border-radius:14px;
  padding:11px 14px;display:flex;align-items:center;gap:13px;
  transition:border-color .2s,background .2s;
}
.gl-row:hover{border-color:var(--c);background:#fff4ea;}
.gl-row:focus-visible{outline:2px solid var(--ember);outline-offset:2px;}
.gl-row .g{
  width:42px;height:42px;border-radius:50%;flex:0 0 auto;background:var(--c);
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-size:19px;font-weight:700;color:#fff;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
}
.gl-row .gl-tx{flex:1;min-width:0;line-height:1.5;}
.gl-row .gl-tx b{font-size:14px;display:block;}
.gl-row .gl-tx small{font-size:11px;color:var(--ink-soft);display:block;}
.gl-row .ar{color:var(--ink-soft);font-size:12px;flex:0 0 auto;}
.about-links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:20px;}
.th-more{margin-top:10px;position:relative;z-index:1;}
.th-more a{
  color:#fff;font-size:12px;font-weight:700;cursor:pointer;
  text-decoration:underline;text-underline-offset:3px;opacity:.95;
}

/* ---------- quiz ---------- */
.q-progress{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.q-progress .bar{flex:1;height:6px;background:var(--washi-deep);border-radius:99px;overflow:hidden;}
.q-progress .bar i{display:block;height:100%;background:var(--ember);border-radius:99px;transition:width .35s ease;}
.q-progress .num{font-size:12px;color:var(--ink-soft);letter-spacing:.1em;font-weight:700;min-width:4.5em;text-align:right;}
.q-text{
  font-family:'Shippori Mincho',serif;font-size:19px;font-weight:600;
  line-height:1.7;letter-spacing:.03em;min-height:4.6em;
  display:flex;align-items:center;margin-bottom:20px;
}
.q-opts{display:grid;gap:9px;}
.q-opts button{
  appearance:none;cursor:pointer;font-family:inherit;
  background:var(--washi);border:1.5px solid var(--line);border-radius:14px;
  padding:13px 16px;font-size:14.5px;font-weight:500;color:var(--ink);
  text-align:left;display:flex;align-items:center;gap:12px;
  transition:border-color .2s,background .2s;
}
.q-opts button .mark{
  width:16px;height:16px;border-radius:50%;
  border:2px solid var(--ink-soft);flex:0 0 auto;
  transition:background .2s,border-color .2s;
}
.q-opts button:hover{border-color:var(--ember);background:#fff4ea;}
.q-opts button:hover .mark{border-color:var(--ember);}
.q-opts button:focus-visible{outline:2px solid var(--ember);outline-offset:2px;}
.q-back{margin-top:16px;text-align:center;}
.q-back button{
  appearance:none;border:0;background:none;cursor:pointer;font-family:inherit;
  font-size:12px;color:var(--ink-soft);text-decoration:underline;text-underline-offset:3px;
}

/* ---------- result ---------- */
.seal{
  width:120px;height:120px;border-radius:50%;margin:4px auto 14px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-size:56px;font-weight:700;color:#fff;
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.4),0 4px 14px rgba(43,36,29,.18),
    0 10px 26px -6px var(--accent,var(--ember));
  position:relative;
  transition:transform .25s ease;
}
.seal:hover{transform:rotate(-4deg) scale(1.04);}
.seal::after{
  content:"";position:absolute;inset:-10px;border-radius:50%;
  background:conic-gradient(var(--moku) 0 25%,var(--tsuchi) 25% 50%,var(--kin) 50% 75%,var(--mizu) 75% 100%);
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 6px),#000 calc(100% - 6px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 6px),#000 calc(100% - 6px));
  animation:rvspin 14s linear infinite;
}
.res-eyebrow{
  text-align:center;font-size:11px;letter-spacing:.34em;color:var(--ink-soft);
  margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:10px;
}
.res-eyebrow::before,.res-eyebrow::after{content:"";height:1px;background:var(--line);width:26px;}
.res-blend{
  background:var(--washi);border:1px solid var(--line);border-radius:16px;
  border-top:5px solid var(--accent,var(--ember));
  padding:16px 18px 14px;margin-bottom:22px;text-align:center;
}
.res-blend .bl-catch{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;letter-spacing:.05em;margin-bottom:10px;}
.res-blend .bl-bar{display:flex;height:14px;border-radius:99px;overflow:hidden;margin-bottom:8px;box-shadow:inset 0 0 0 1px rgba(43,36,29,.08);}
.res-blend .bl-bar i{display:block;height:100%;}
.res-blend .bl-nums{font-size:13px;font-weight:700;color:var(--ink-soft);letter-spacing:.04em;}
.res-catch{text-align:center;font-size:12.5px;letter-spacing:.22em;color:var(--ink-soft);margin-bottom:2px;}
.res-name{
  text-align:center;font-family:'Shippori Mincho',serif;
  font-size:26px;font-weight:700;letter-spacing:.1em;margin-bottom:6px;
}
.res-kana{text-align:center;font-size:11px;color:var(--ink-soft);letter-spacing:.3em;margin-bottom:18px;}
.res-bars{display:grid;gap:10px;margin-bottom:24px;}
.res-bars .row{display:grid;grid-template-columns:2.6em 1fr 3.2em;align-items:center;gap:10px;font-size:13px;}
.res-bars .row .k{font-family:'Shippori Mincho',serif;font-weight:700;font-size:15px;}
.res-bars .row .tr{height:10px;background:var(--washi-deep);border-radius:99px;overflow:hidden;}
.res-bars .row .tr i{display:block;height:100%;border-radius:99px;width:0;transition:width .9s cubic-bezier(.2,.7,.3,1);}
.res-bars .row .v{text-align:right;font-weight:700;color:var(--ink-soft);font-size:12px;}
.res-sec{border-top:1px solid var(--line);padding-top:20px;margin-top:20px;}
.res-sec h3{
  font-family:'Shippori Mincho',serif;
  font-size:15px;letter-spacing:.18em;color:var(--ink);font-weight:700;
  margin-bottom:10px;display:flex;align-items:center;gap:9px;
}
.res-sec h3::before{content:"";width:10px;height:10px;border-radius:3px;background:var(--accent,var(--ember));}
.res-sec p.story{font-size:14px;line-height:2.05;text-align:justify;}
.res-sec p.story + p.story{margin-top:.9em;}
.res-taste{
  background:var(--washi);border-radius:14px;padding:14px 16px;font-size:13.5px;
  display:flex;gap:14px;align-items:center;
}
.res-taste .t{
  font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;
  color:var(--accent,var(--ember));flex:0 0 auto;line-height:1.3;text-align:center;
}
.res-taste .t small{display:block;font-family:'Zen Maru Gothic',sans-serif;font-size:9px;letter-spacing:.2em;color:var(--ink-soft);}
.res-points{display:flex;flex-wrap:wrap;gap:8px;}
.res-points button{
  appearance:none;cursor:pointer;font-family:inherit;
  background:var(--card);border:1.5px solid var(--line);border-radius:999px;
  padding:8px 14px;font-size:13px;font-weight:700;color:var(--ink);
  display:inline-flex;align-items:center;gap:6px;transition:border-color .2s;
}
.res-points button::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--ember);}
.res-points button:hover{border-color:var(--ember);}
.res-actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:26px;}

/* ---------- 質問のラベル（寄り道／豆知識） ---------- */
.q-kind{
  display:inline-flex;align-items:center;gap:7px;
  font-size:11px;font-weight:700;letter-spacing:.14em;
  padding:5px 12px;border-radius:999px;margin-bottom:14px;
}
.q-kind::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;}
.kind-yorimichi{color:var(--kin);background:rgba(220,176,81,.18);}
.kind-mame{color:var(--mizu);background:rgba(90,150,177,.14);}
.q-opts button.opt-plain{padding-left:16px;}
.q-opts button.opt-plain .mark{display:none;}

/* ---------- 豆知識カード ---------- */
.trivia-card{background:linear-gradient(180deg,#ffffff,#fff3ea);border-left:5px solid var(--ember);}
.trivia-card .tr-tag{
  font-family:'Shippori Mincho',serif;font-size:19px;font-weight:700;
  letter-spacing:.08em;text-align:center;margin-bottom:14px;
  position:relative;padding-bottom:12px;
}
.trivia-card .tr-tag::after{content:"";position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:34px;height:2px;background:var(--ember);border-radius:2px;}
.trivia-card .tr-body{font-size:14.5px;line-height:2.05;text-align:justify;color:var(--ink);}

/* ---------- 結果前の演出 ---------- */
.reveal{text-align:center;padding:44px 22px;}
.rv-ring{position:relative;width:190px;height:190px;margin:6px auto 26px;animation:rvspin 6s linear infinite;}
@keyframes rvspin{to{transform:rotate(360deg);}}
.rv-dot{
  position:absolute;top:50%;left:50%;width:46px;height:46px;margin:-23px;
  border-radius:50%;background:var(--c);color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.4);
  transform:rotate(calc(var(--i) * 90deg)) translateY(-70px) rotate(calc(var(--i) * -90deg));
  opacity:0;animation:rvpop .5s ease forwards;animation-delay:calc(var(--i) * .18s);
}
@keyframes rvpop{from{opacity:0;transform:rotate(calc(var(--i) * 90deg)) translateY(-40px) rotate(calc(var(--i) * -90deg)) scale(.6);}to{opacity:1;}}
.rv-core{
  position:absolute;top:50%;left:50%;width:64px;height:64px;margin:-32px;
  border-radius:50%;background:var(--washi);border:1.5px dashed var(--line);
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-size:26px;color:var(--ink);
  animation:rvspin 6s linear infinite reverse;
}
.rv-text{font-family:'Shippori Mincho',serif;font-size:16px;letter-spacing:.1em;color:var(--ink-soft);}

/* ---------- 相性 ---------- */
/* ---------- 五行サイクル図 ---------- */
.aisho-fig{margin:0 auto 16px;max-width:300px;text-align:center;}
.gogyo-cycle{width:100%;max-width:280px;height:auto;display:block;margin:0 auto;}
.gogyo-cycle .gc-k{font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;text-anchor:middle;dominant-baseline:central;}
.gogyo-cycle .gc-sheng{stroke:#f1dcc3;stroke-width:2;}
.gogyo-cycle .gc-ke{stroke:#ffd9c4;stroke-width:1.6;stroke-dasharray:3 4;}
.gogyo-cycle .gc-sheng.on{stroke-width:4;opacity:.9;}
.gogyo-cycle .gc-ke.on{stroke-width:3;stroke-dasharray:4 4;opacity:.9;}
.gc-legend{display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:10.5px;color:var(--ink-soft);}
.gc-legend span{display:inline-flex;align-items:center;gap:5px;}
.gc-legend i{width:16px;height:0;display:inline-block;}
.gc-legend .l-sheng{border-top:3px solid #b1552f;}
.gc-legend .l-ke{border-top:2px dashed #ff5a36;}

/* ---------- 相性カード ---------- */
.aisho{display:grid;gap:10px;}
.ai-card{
  display:flex;align-items:flex-start;gap:13px;
  background:var(--washi);border:1px solid var(--line);border-radius:14px;padding:14px 16px;
  border-left:4px solid var(--c);
}
.ai-card.ke{border-left-style:dashed;}
.ai-card .g{
  width:40px;height:40px;border-radius:50%;flex:0 0 auto;background:var(--c);margin-top:2px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-size:19px;font-weight:700;color:#fff;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
}
.ai-card .ai-law{font-size:10.5px;letter-spacing:.1em;color:var(--c);font-weight:700;display:block;margin-bottom:1px;}
.ai-card b{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:700;display:block;line-height:1.3;}
.ai-card small{font-size:12px;color:var(--ink-soft);line-height:1.7;display:block;margin-top:2px;}

/* ---------- 気質と感情 ---------- */
.kishitsu{
  display:flex;align-items:center;gap:16px;margin:22px 0 4px;
  background:var(--washi);border:1px solid var(--line);border-radius:16px;padding:16px 18px;
  border-left:5px solid var(--c);
}
.kishitsu .ki-emo{flex:0 0 auto;text-align:center;line-height:1;}
.kishitsu .ki-kanji{
  display:flex;align-items:center;justify-content:center;
  width:58px;height:58px;border-radius:50%;background:var(--c);color:#fff;
  font-family:'Shippori Mincho',serif;font-size:30px;font-weight:700;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
}
.kishitsu .ki-emo small{display:block;margin-top:6px;font-size:10px;letter-spacing:.2em;color:var(--ink-soft);}
.kishitsu .ki-kuchi{font-size:14px;margin-bottom:4px;}
.kishitsu .ki-kuchi b{font-family:'Shippori Mincho',serif;font-size:17px;color:var(--ink);}
.kishitsu .ki-note{font-size:12.5px;color:var(--ink-soft);line-height:1.75;}

/* ---------- 箇条書き（性格・セルフケア） ---------- */
.feat-list{list-style:none;display:grid;gap:8px;}
.feat-list li{
  position:relative;padding-left:22px;font-size:14px;line-height:1.7;
}
.feat-list li::before{
  content:"";position:absolute;left:4px;top:.62em;
  width:8px;height:8px;border-radius:50%;background:var(--accent,var(--ember));
}
.feat-list.care li::before{border-radius:2px;transform:rotate(45deg);top:.55em;}

.fatigue-tag{
  margin-top:12px;display:inline-block;font-size:12px;font-weight:700;color:var(--ink-soft);
  background:var(--washi);border:1px solid var(--line);border-radius:999px;padding:5px 14px;
}

/* ---------- 種明かし ---------- */
.wink{
  background:var(--washi);border:1px dashed var(--line);border-radius:14px;
  padding:14px 16px;margin-top:20px;
}
.wink p{font-size:13px;line-height:1.95;color:var(--ink-soft);}
.wink b{color:var(--ember);}

/* ---------- 結果のシェア ---------- */
.res-share{
  margin-top:24px;padding:20px 16px;border-radius:16px;text-align:center;
  background:var(--washi-deep);border:1px solid var(--line);
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.res-share .rs-lead{font-family:'Shippori Mincho',serif;font-size:16px;font-weight:700;letter-spacing:.06em;margin-bottom:2px;}
.res-share .btn{width:100%;max-width:280px;}
.res-share .rs-primary{width:100%;display:flex;justify-content:center;}
.rs-row{display:flex;flex-wrap:wrap;justify-content:center;gap:9px;width:100%;}
.rs-chip{
  appearance:none;cursor:pointer;font-family:inherit;
  display:inline-flex;align-items:center;gap:7px;
  background:var(--card);color:var(--ink);
  font-size:12.5px;font-weight:700;letter-spacing:.04em;
  padding:10px 16px;border:1.5px solid var(--line);border-radius:999px;
  transition:transform .15s,border-color .2s;
}
.rs-chip:hover{transform:translateY(-2px);border-color:var(--ember-soft);}
.rs-chip:active{transform:translateY(0) scale(.97);}
.rs-chip:focus-visible{outline:2px solid var(--ember);outline-offset:2px;}
.rs-chip.save{color:var(--ink-soft);}
.rs-chip .ic{width:16px;height:16px;flex:0 0 auto;display:block;}
.rs-divider{width:44px;height:1px;background:var(--line);margin:2px 0;}
.rs-note{font-size:11.5px;color:var(--ink-soft);line-height:1.9;max-width:30em;}
.rs-note b{color:var(--ember);font-weight:700;letter-spacing:.02em;}

/* ---------- トースト ---------- */
.toast{
  position:fixed;left:50%;bottom:34px;transform:translate(-50%,20px);
  background:var(--ink);color:var(--card);font-size:13px;font-weight:700;letter-spacing:.04em;
  padding:12px 20px;border-radius:999px;box-shadow:0 6px 20px rgba(43,36,29,.25);
  opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:99;max-width:88vw;text-align:center;
}
.toast.on{opacity:1;transform:translate(-50%,0);}

/* ---------- finder: home ---------- */
.home-sec{margin-bottom:26px;}
.home-sec h2{
  font-family:'Shippori Mincho',serif;font-size:17px;font-weight:700;
  letter-spacing:.12em;margin-bottom:4px;
}
.home-sec .hs-lead{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}
.sym-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;}
.sym-grid button{
  appearance:none;cursor:pointer;font-family:inherit;text-align:left;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:13px 15px;transition:border-color .2s,transform .15s;
  display:flex;align-items:center;gap:10px;
}
.sym-grid button:hover{border-color:var(--ember);transform:translateY(-2px);}
.sym-grid button:focus-visible{outline:2px solid var(--ember);outline-offset:2px;}
.sym-grid button .ic{
  width:30px;height:30px;border-radius:50%;flex:0 0 auto;
  background:var(--washi);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-size:14px;color:var(--ember);
}
.sym-grid button .nm{font-size:13.5px;font-weight:700;line-height:1.4;}
.sym-grid button .ar{margin-left:auto;color:var(--ink-soft);font-size:12px;}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
@media(max-width:430px){.type-grid{grid-template-columns:1fr;}}
.type-grid button{
  appearance:none;cursor:pointer;font-family:inherit;text-align:left;
  background:var(--card);border:1px solid var(--line);border-radius:16px;
  padding:14px 16px;display:flex;align-items:center;gap:13px;
  transition:border-color .2s,transform .15s;
}
.type-grid button:hover{border-color:var(--c);transform:translateY(-2px);}
.type-grid button:focus-visible{outline:2px solid var(--ember);outline-offset:2px;}
.type-grid button .g{
  width:44px;height:44px;border-radius:50%;flex:0 0 auto;background:var(--c);
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-size:20px;font-weight:700;color:#fff;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.35);
}
.type-grid button .nm{font-size:14.5px;font-weight:700;}
.type-grid button .ct{display:block;font-size:11px;color:var(--ink-soft);font-weight:500;}
.quiz-invite{
  margin-top:12px;background:var(--washi);border:1px dashed var(--line);
  border-radius:14px;padding:12px 16px;font-size:12.5px;color:var(--ink-soft);
}
.quiz-invite a{color:var(--ember);font-weight:700;cursor:pointer;text-decoration:underline;text-underline-offset:3px;}

/* ---------- finder: page ---------- */
.back-link{
  appearance:none;border:0;background:none;cursor:pointer;font-family:inherit;
  font-size:13px;font-weight:700;color:var(--ink-soft);
  display:inline-flex;align-items:center;gap:7px;margin-bottom:16px;
  padding:4px 2px;
}
.back-link:hover{color:var(--ember);}
.back-link:focus-visible{outline:2px solid var(--ember);outline-offset:2px;}
.page-head{margin-bottom:6px;}
.page-head h2{
  font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;
  letter-spacing:.1em;line-height:1.5;
}
.page-head .pg-lead{font-size:13px;color:var(--ink-soft);margin-top:4px;margin-bottom:18px;max-width:36em;}
.type-head{
  border-radius:var(--radius);padding:22px;margin-bottom:18px;color:#fff;
  background:var(--c);position:relative;overflow:hidden;
}
.type-head::after{
  content:attr(data-kanji);position:absolute;right:6px;bottom:-34px;
  font-family:'Shippori Mincho',serif;font-size:120px;font-weight:700;
  color:rgba(255,255,255,.13);line-height:1;
}
.type-head .th-catch{font-size:11.5px;letter-spacing:.22em;opacity:.9;}
.type-head .th-name{font-family:'Shippori Mincho',serif;font-size:23px;font-weight:700;letter-spacing:.1em;margin:2px 0 8px;}
.type-head .th-desc{font-size:12.5px;line-height:1.9;opacity:.95;max-width:34em;position:relative;z-index:1;}

/* ---------- tsubo detail card ---------- */
.p-list{display:grid;gap:14px;}
.p-card{
  background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:22px;
  box-shadow:0 2px 0 rgba(43,36,29,.05);
}
.p-card .p-top{display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:4px;}
.p-card .p-name .kn{font-size:10.5px;letter-spacing:.22em;color:var(--ink-soft);display:block;}
.p-card .p-name .nm{font-family:'Shippori Mincho',serif;font-size:24px;font-weight:700;letter-spacing:.08em;line-height:1.35;}
.badge{
  margin-left:auto;flex:0 0 auto;
  font-size:10.5px;font-weight:700;letter-spacing:.08em;color:#fff;
  padding:5px 12px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;
}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.85);}
.badge.all{background:var(--washi-deep);color:var(--ink-soft);border:1px solid var(--line);}
.badge.all::before{background:var(--ink-soft);}
.p-fine{font-size:13px;color:var(--ink-soft);margin-bottom:14px;}
.p-fine b{color:var(--ember);font-weight:700;}
.d-fig{
  background:var(--washi);border:1px solid var(--line);border-radius:16px;
  padding:14px 14px 8px;display:flex;flex-direction:column;align-items:center;margin-bottom:14px;
}
.d-fig svg{max-width:270px;width:100%;height:auto;}
.d-fig .cap{font-size:11px;color:var(--ink-soft);letter-spacing:.06em;padding:4px 0 4px;}
/* からだの図の描画スタイル */
.d-fig .skin{fill:#f3d7ba;stroke:#a8815f;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.d-fig .skin2{fill:#e9bd94;stroke:#a8815f;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.d-fig .hair{fill:#7c6a4f;stroke:#6d5c43;stroke-width:1.5;stroke-linejoin:round;}
.d-fig .nail{fill:#f8f0dd;stroke:#b3a181;stroke-width:1;}
.d-fig .shade{fill:rgba(138,113,76,.14);stroke:none;}
.d-fig .thin{fill:none;stroke:#a4906b;stroke-width:1.5;stroke-linecap:round;}
.d-fig .soft{fill:none;stroke:#c2ae87;stroke-width:1.3;stroke-linecap:round;}
.d-fig .dash{fill:none;stroke:#a4906b;stroke-width:1.3;stroke-dasharray:4 4;}
.d-fig .lm{font-family:'Zen Maru Gothic',sans-serif;font-size:10px;fill:#8a7d64;letter-spacing:.08em;}
.d-fig .halo{fill:rgba(192,99,46,.22);animation:pulse 1.8s ease-in-out infinite;transform-origin:center;transform-box:fill-box;}
.d-fig .dot{fill:var(--ember);stroke:#fff;stroke-width:1.6;}
.d-fig .pt.pair-sub .halo{animation:none;fill:rgba(192,99,46,.12);}
.d-fig .pt.pair-sub .dot{fill:var(--ember-soft);}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.9;}50%{transform:scale(1.55);opacity:.35;}}
@media(prefers-reduced-motion:reduce){
  .d-fig .halo{animation:none;}
  *{transition-duration:.01ms!important;animation-duration:.01ms!important;}
}
.d-sec{margin-bottom:12px;}
.d-sec h4{
  font-size:12px;letter-spacing:.2em;color:var(--ink-soft);font-weight:700;
  margin-bottom:4px;display:flex;align-items:center;gap:7px;
}
.d-sec h4::before{content:"";width:14px;height:1.5px;background:var(--ember);}
.d-sec p{font-size:14px;}
.d-tip{
  margin-top:18px;background:var(--washi);border-radius:14px;padding:13px 16px;
  font-size:12.5px;color:var(--ink-soft);line-height:1.9;
}
.d-tip b{color:var(--ink);}
.moxa-ng{
  display:flex;gap:10px;align-items:flex-start;
  background:#fff1ec;border:1.5px solid var(--ember);border-radius:12px;
  padding:11px 14px;margin-bottom:14px;
}
.moxa-ng .ic{flex:0 0 auto;width:22px;height:22px;border-radius:50%;
  background:var(--ember);color:#fff;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;line-height:1;margin-top:1px;}
.moxa-ng p{font-size:12.5px;line-height:1.75;color:#b23b1e;}
.moxa-ng b{font-weight:700;color:var(--ember);}
.page-foot{margin-top:22px;text-align:center;}

/* ---------- detail sheet（診断結果からのクイック表示用） ---------- */
.sheet-bg{
  position:fixed;inset:0;background:rgba(52,44,32,.45);
  opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;
  backdrop-filter:blur(2px);
}
.sheet-bg.on{opacity:1;pointer-events:auto;}
.sheet{
  position:fixed;left:50%;bottom:0;transform:translate(-50%,105%);
  width:min(600px,100%);max-height:88vh;overflow-y:auto;
  background:var(--card);border-radius:22px 22px 0 0;
  padding:22px 22px 30px;z-index:41;
  transition:transform .32s cubic-bezier(.2,.8,.3,1);
  border:1px solid var(--line);border-bottom:0;
}
.sheet.on{transform:translate(-50%,0);}
@media(min-width:640px){
  .sheet{bottom:auto;top:50%;border-radius:22px;border-bottom:1px solid var(--line);
    transform:translate(-50%,-46%) scale(.96);opacity:0;pointer-events:none;max-height:86vh;}
  .sheet.on{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:auto;}
}
.sheet .close{
  position:sticky;top:0;float:right;appearance:none;border:0;cursor:pointer;
  width:34px;height:34px;border-radius:50%;background:var(--washi-deep);
  color:var(--ink-soft);font-size:16px;line-height:1;font-family:inherit;
}
.sheet .close:focus-visible{outline:2px solid var(--ember);}
.sheet .p-card{border:0;box-shadow:none;padding:4px 0 0;}

/* ---------- footer ---------- */
.foot{margin-top:44px;border-top:1px solid var(--line);padding-top:20px;}
.foot .brand{
  font-family:'Shippori Mincho',serif;font-size:15px;letter-spacing:.34em;
  text-align:center;margin-bottom:8px;color:var(--ink);
}
.foot .tag{text-align:center;font-size:10.5px;letter-spacing:.2em;color:var(--ink-soft);margin-bottom:14px;}
.foot .note{text-align:center;max-width:36em;margin:0 auto;}

/* ============================================================
   FX layer（v7）— 演出専用の追加スタイル
   ・中身（テキスト／データ／診断ロジック）には手を触れません
   ・既存のCSS変数・クラス名はそのまま利用しています
   ============================================================ */

/* --- 五行の帯：左から描かれて、ゆっくり流れる --- */
body::before{
  background:linear-gradient(90deg,var(--moku),var(--tsuchi),var(--kin),var(--mizu),var(--moku));
  background-size:300% 100%;
  transform-origin:left;
  animation:fxBarDraw 1s cubic-bezier(.2,.8,.2,1) both,
            fxBarFlow 30s linear 1s infinite;
}
@keyframes fxBarDraw{from{transform:scaleX(0);}to{transform:scaleX(1);}}
@keyframes fxBarFlow{from{background-position:0 0;}to{background-position:300% 0;}}

/* --- 気配のレイヤー（背景canvas）と重なり順 --- */
#fx-ki{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#fx-ki-top{position:fixed;inset:0;width:100%;height:100%;z-index:55;pointer-events:none;}
.wrap{position:relative;z-index:1;}

/* --- 共通モーション --- */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}

/* --- ヘッダーの立ち上がり --- */
.fx-intro .eyebrow{animation:fadeUp .6s .1s both;}
.fx-intro h1 .fx-ch{display:inline-block;opacity:0;animation:fxCh .55s both;}
@keyframes fxCh{
  from{opacity:0;transform:translateY(.45em) rotate(3deg);filter:blur(2px);}
  to{opacity:1;transform:none;filter:none;}
}
.fx-intro .lead{animation:fadeUp .6s .95s both;}
.fx-intro .mode-nav{animation:fadeUp .6s 1.1s both;}

/* --- 画面ごとの立ち上がり（子要素の時間差） --- */
.fade-in .q-text{animation:fadeUp .4s both;}
.fade-in .q-opts button,
.fade-in .gl-row,
.fade-in .sym-grid button,
.fade-in .type-grid button{
  opacity:0;animation:fadeUp .45s both;
  animation-delay:calc(var(--fxi,0)*.06s + .05s);
}
.gl-row .g{animation:fxBob 5s ease-in-out infinite;animation-delay:calc(var(--fxi,0)*.7s);}
@keyframes fxBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}

/* --- タップの波紋・選択の手ごたえ --- */
.q-opts button,.btn,.gl-row,.sym-grid button,.type-grid button,.res-points button{
  position:relative;overflow:hidden;
}
.fx-ripple{
  position:absolute;border-radius:50%;background:currentColor;
  opacity:.16;transform:scale(0);pointer-events:none;
  animation:fxRip .55s ease-out both;
}
@keyframes fxRip{to{transform:scale(1);opacity:0;}}
.q-opts button.picked{border-color:var(--ember);background:#fff0e6;}
.q-opts button.picked .mark{
  border-color:var(--ember);background:var(--ember);
  box-shadow:0 0 0 3px var(--ember-soft);
}
.fx-out{animation:fxOut .16s ease both !important;}
@keyframes fxOut{to{opacity:0;transform:translateY(-10px);}}

/* --- 進捗バー：灯りがともって進む --- */
.q-progress .bar{overflow:visible;}
.q-progress .bar i{
  position:relative;
  background:linear-gradient(90deg,var(--kin),var(--ember));
  background-size:200% 100%;
  animation:fxEmberFlow 2.6s ease-in-out infinite alternate;
}
@keyframes fxEmberFlow{from{background-position:0 0;}to{background-position:100% 0;}}
.q-progress .bar i::after{
  content:"";position:absolute;right:-1px;top:50%;
  width:10px;height:10px;margin-top:-5px;border-radius:50%;
  background:var(--ember);
  box-shadow:0 0 9px 2px rgba(255,90,54,.55);
  animation:fxEmberGlow 1.6s ease-in-out infinite;
}
@keyframes fxEmberGlow{0%,100%{box-shadow:0 0 6px 1px rgba(255,90,54,.4);}50%{box-shadow:0 0 12px 3px rgba(255,90,54,.7);}}

/* --- 結果前の演出：収束する巡り --- */
.fx-orbit{position:relative;width:190px;height:190px;margin:6px auto 26px;}
.fx-orbit .fx-dot{
  position:absolute;top:50%;left:50%;width:46px;height:46px;margin:-23px;
  border-radius:50%;color:#fff;opacity:0;transition:opacity .5s ease;
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-size:22px;font-weight:700;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.4);
  will-change:transform;
}
.fx-orbit .rv-core{
  position:absolute;top:50%;left:50%;width:64px;height:64px;margin:-32px;
  border-radius:50%;background:var(--washi);border:1.5px dashed var(--line);
  display:flex;align-items:center;justify-content:center;
  font-family:'Shippori Mincho',serif;font-size:26px;color:var(--ink);
  will-change:transform;
}

/* --- 光の満ちる一瞬 --- */
.fx-flash{position:fixed;inset:0;z-index:60;pointer-events:none;opacity:0;}
.fx-flash.on{animation:fxFlash .7s ease-out both;}
@keyframes fxFlash{0%{opacity:0;}14%{opacity:.55;}100%{opacity:0;}}

/* --- 押印（スタンプ）と結果の立ち上がり --- */
.fx-stamp{animation:fxThud .3s .3s ease both;}
@keyframes fxThud{0%,100%{transform:none;}45%{transform:translateY(2px);}75%{transform:translateY(-1px);}}
.fx-stamp .seal{
  animation:fxStamp .62s cubic-bezier(.18,1.35,.32,1) both;
  cursor:pointer;
}
@keyframes fxStamp{
  0%{transform:scale(2.4) rotate(-12deg);opacity:0;}
  58%{transform:scale(.94) rotate(2deg);opacity:1;}
  80%{transform:scale(1.05) rotate(-1deg);}
  100%{transform:scale(1) rotate(0);}
}
.fx-ink{
  position:absolute;inset:-6px;border-radius:50%;
  border:3px solid currentColor;opacity:0;pointer-events:none;
}
.fx-stamp .fx-ink{animation:fxInk .85s .34s ease-out both;}
@keyframes fxInk{0%{opacity:.5;transform:scale(.9);}100%{opacity:0;transform:scale(2);}}
.fx-cascade > *{opacity:0;animation:fadeUp .55s both;}

/* --- シェアボタンの光の帯 --- */
.fx-shine{position:relative;overflow:hidden;}
.fx-shine::after{
  content:"";position:absolute;top:0;left:-70%;width:40%;height:100%;
  background:linear-gradient(100deg,transparent,rgba(255,255,255,.5),transparent);
  animation:fxShine 4.4s ease-in-out 1.6s infinite;
}
@keyframes fxShine{0%,72%{left:-70%;}92%,100%{left:135%;}}

/* --- スクロールで現れるツボカード --- */
.fx-io{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease;}
.fx-io.in{opacity:1;transform:none;}

@media(prefers-reduced-motion:reduce){
  #fx-ki,#fx-ki-top{display:none;}
  .fade-in .q-opts button,.fade-in .gl-row,
  .fade-in .sym-grid button,.fade-in .type-grid button,
  .fx-cascade > *,.fx-intro h1 .fx-ch{opacity:1;animation:none;}
  .fx-io{opacity:1;transform:none;}
}

/* ============================================================
   日本語の折り返し調整（v9追加）
   ・変な位置での改行や、行末の泣き別れ（1文字だけ残る等）を抑えます
   ・line-break:strict … 小さいカナ・句読点の前で切れないように
   ・text-wrap:pretty/balance … 行末のばらつき・最終行の孤立を軽減
   ・word-break:auto-phrase … 対応ブラウザでは文節単位で改行（progressive）
   ============================================================ */
.lead,.res-catch,.res-name,.res-kana,.bl-catch,.rs-lead,.rs-note,.pg-lead,
.story,.tr-body,.type-head .th-desc,.wink p,.ki-note,.note,
.feat-list li,.ai-card small,.moxa-ng p,.res-taste span{
  line-break:strict;
  text-wrap:pretty;
}
.lead,.res-catch,.res-name,.bl-catch,.rs-lead,.pg-lead{
  text-wrap:balance;
}
@supports (word-break:auto-phrase){
  .lead,.res-name,.res-catch,.bl-catch,.pg-lead,
  .type-head .th-desc,.wink p{
    word-break:auto-phrase;
  }
}
/* 長い本文は読みやすい横幅にそろえる（適切な measure） */
.res-sec p.story,.trivia-card .tr-body{
  max-width:34em;margin-left:auto;margin-right:auto;
}
/* 語のまとまりを保って折り返す（この単位の内側では改行しない） */
.nb{white-space:nowrap;}

/* ============================================================
   診断前のひと呼吸（v10追加）
   ============================================================ */
.breath{text-align:center;}
.breath .res-eyebrow{margin-bottom:16px;}
.breath-mark{
  width:128px;height:128px;margin:4px auto 22px;border-radius:50%;
  background:radial-gradient(circle at 50% 50%,rgba(255,90,54,.14),rgba(255,90,54,.04) 60%,transparent 72%);
  display:flex;align-items:center;justify-content:center;position:relative;
}
.breath-mark::before{
  content:"";position:absolute;inset:0;border-radius:50%;
  border:1.5px solid var(--ember-soft);
  animation:breathe 8s ease-in-out infinite;
}
.breath-mark span{

/* ---------- 陰陽五行とは？ ---------- */

  <div class="fade-in">
    <button class="back-link" onclick="renderStart();toTop();">← 診断のトップにもどる</button>
    <div class="card">
      <p class="res-eyebrow">よみもの</p>
      <h2 class="serif" style="font-size:21px;font-weight:700;letter-spacing:.1em;text-align:center;margin-bottom:18px;">陰陽五行とは？</h2>
      <p class="story" style="font-size:14px;line-height:2.05;margin-bottom:14px;">東洋医学では、人のからだと心のはたらきを「木・火・土・金・水」——五行という、5つのはたらきでとらえます。季節が春夏秋冬とめぐるように、人にもこの5つがそなわっていて、その偏りかたに、その人らしさ＝体質があらわれる、という考えかたです。土台には「陰と陽」というバランスの見かたもありますが、まずは五行の入口から。</p>
      <p class="story" style="font-size:14px;line-height:2.05;margin-bottom:14px;">このページの診断では、日本の伝統的な考えかたにもとづいて、「火」のはたらきをほかの4つに含めた、木・土・金・水の4タイプでみています。どのタイプが良い・悪いということはありません。それぞれが、めぐりの個性です。</p>
      <p class="story" style="font-size:14px;line-height:2.05;margin-bottom:20px;">自分の偏りを知って、暮らしのなかでそっと整える。そのためのやさしい地図として、使ってみてください。</p>

/* ---------- 診断：設問（抽選＋シャッフル＋寄り道＋豆知識） ---------- */
let FLOW = [];   // その回の質問の並び（q / dummy / trivia）
let PICK = [];   // 各項目のこたえ（qとdummyのみ。triviaはnull）

function shuffle(a){
  const r = a.slice();
  for(let i=r.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [r[i],r[j]]=[r[j],r[i]]; }
  return r;
}

/* その回の出題を組み立てる */
function buildFlow(){
  const N = QUIZ_CFG.N_PER_TYPE;
  // 各タイプのプールから N問ずつ抽選 → 採点対象の質問
  let qs = [];
  Object.keys(POOL).forEach(t=>{
    shuffle(POOL[t]).slice(0,N).forEach(text=>qs.push({kind:'q', t, q:text}));
  });
  qs = shuffle(qs);
  // 寄り道（ダミー）を抽選して差しこむ
  const dummies = shuffle(DUMMY).slice(0, QUIZ_CFG.DUMMY_COUNT).map(d=>({kind:'dummy', ...d}));
  // 質問＋寄り道をまぜて、答える項目の並びをつくる
  return shuffle(qs.concat(dummies));
}

function startQuiz(){
  FLOW = buildFlow();
  PICK = FLOW.map(()=>null);
  qIndex = 0;
  renderItem();
}

/* 「いま何問目か」= 答える項目（q/dummy）の中での位置 */
function questionMeta(){
  const answerable = FLOW.filter(f=>f.kind!=='trivia');
  const answeredBefore = FLOW.slice(0, qIndex).filter(f=>f.kind!=='trivia').length;
  const cur = FLOW[qIndex].kind==='trivia' ? answeredBefore : answeredBefore+1;
  return { total: answerable.length, cur, pct: Math.round(answeredBefore/answerable.length*100) };
}

function renderItem(){
  const item = FLOW[qIndex];
  if(item.kind==='trivia'){ renderTrivia(item); return; }
  const m = questionMeta();
  const isDummy = item.kind==='dummy';
  const opts = isDummy
    ? item.opts.map((label,i)=>`<button class="opt-plain" onclick="answer(${i})">${label}</button>`).join('')

/* 五行サイクル図（相生＝実線・相剋＝点線、自分の関係だけ色づけ） */
function gogyoCycleSVG(key){
  const N = GOGYO_NODES;
  const t = TYPES[key];
  const rel = RELATION[key];
  const shengPair = [key, rel.sheng.t];
  const kePair = [key, rel.ke.t];
  const same = (e,p)=> (e[0]===p[0]&&e[1]===p[1])||(e[0]===p[1]&&e[1]===p[0]);
  const nodeR = k => k===key ? 21 : (N[k].faded ? 15 : 17);
  function edge(a,b,cls,color){
    const A=N[a], B=N[b];
    const dx=B.x-A.x, dy=B.y-A.y, len=Math.hypot(dx,dy);
    const ux=dx/len, uy=dy/len;
    const x1=A.x+ux*nodeR(a), y1=A.y+uy*nodeR(a);
    const x2=B.x-ux*nodeR(b), y2=B.y-uy*nodeR(b);
    return `<line class="${cls}" x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}"${color?` stroke="${color}"`:''}/>`;
  }
  let lines='';
  SHENG_EDGES.forEach(e=>{ if(!same(e,shengPair)) lines += edge(e[0],e[1],'gc-sheng'); });
  KE_EDGES.forEach(e=>{ if(!same(e,kePair)) lines += edge(e[0],e[1],'gc-ke'); });
  lines += edge(shengPair[0],shengPair[1],'gc-sheng on',TYPES[rel.sheng.t].color);
  lines += edge(kePair[0],kePair[1],'gc-ke on',TYPES[rel.ke.t].color);
  let nodes='';
  Object.keys(N).forEach(k=>{
    const n=N[k], r=nodeR(k);
    const isSelf = k===key;
    const col = k==='fire' ? '#e0c9b8' : (TYPES[k]?TYPES[k].color:'#e0c9b8');
    const fill = isSelf ? col : (n.faded ? '#f5eee5' : '#ffffff');
    const txtColor = isSelf ? '#fff' : (n.faded ? '#b8ab97' : col);
    nodes += `<circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${fill}" stroke="${col}" stroke-width="${isSelf?0:2}"/>`+
      `<text class="gc-k" x="${n.x}" y="${n.y}" fill="${txtColor}">${n.kanji}</text>`;
  });
  return `<svg class="gogyo-cycle" viewBox="0 0 220 200" role="img" aria-label="五行の相生相剋の図。あなたは${t.name}。">${lines}${nodes}</svg>`;
}

/* ---------- クイック表示シート（診断結果から） ---------- */
function openSheet(id){
  const p = TSUBO.find(x=>x.id===id);
  $('#sheet-body').innerHTML = detailCardHTML(p) + TIP_HTML;
  $('#sheet').classList.add('on');
  $('#sheet-bg').classList.add('on');
  $('#sheet').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}
function closeSheet(){
  $('#sheet').classList.remove('on');
  $('#sheet-bg').classList.remove('on');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeSheet(); });

/* ---------- かんたんトースト ---------- */
function toast(msg){
  let el = document.getElementById('toast');
  if(!el){ el = document.createElement('div'); el.id='toast'; el.className='toast'; document.body.appendChild(el); }
  el.textContent = msg;
  el.classList.add('on');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('on'), 2400);
}

/* ============================================================
   結果のシェア & 保存（外部ライブラリ不使用・単一ファイル完結）
   ・木・土・金・水 の「配分」を、画像とテキストの両方に含めます
   ・画像は Web Share API 対応時に LINE / Instagram / X などへ直接、
     非対応環境ではダウンロードにフォールバックします
   ============================================================ */

/* ▼ 公開時に、診断ページの実URLへ差し替えてください */
const SHARE_URL = 'https://onkouchishin.life/';
const SHARE_HASHTAG = '#わたしの五行タイプ';
const SAVE_KEY = 'onk_gogyo_last';   // この端末に控える結果の保存キー

/* 木・土・金・水 の配分（各タイプ＝そのタイプの満点に対する％。結果画面のバーと同じ値）。
   並びは固定順（木→土→金→水）。友だちと見くらべやすくするためです。 */
function resultDist(){
  const sc = calcScores();
  const mx = typeMax();
  return ['moku','tsuchi','kin','mizu'].map(k=>({
    key:k, kanji:TYPES[k].kanji, name:TYPES[k].name, color:TYPES[k].color,
    pct: mx ? Math.round(sc[k]/mx*100) : 0
  }));
}
function distLine(dist){ return dist.map(d=>d.kanji + d.pct).join(' '); } // 例：木90 土52 金67 水38

/* 共有・保存に使う文面（タイプ名＋配分） */
function resultShareText(){
  const t = lastResultType ? TYPES[lastResultType] : null;
  if(!t) return 'あなたは何タイプ？ ' + SHARE_HASHTAG;
  return `わたしは「${t.name}」でした。\n五行の配分は ${distLine(resultDist())}。\nあなたは何タイプ？\n${SHARE_HASHTAG}`;
}

/* この端末に控える（機械可読な記録） */
function persistResult(){
  if(!lastResultType) return null;
  const rec = {
    type: lastResultType,
    name: TYPES[lastResultType].name,
    dist: resultDist().map(d=>({k:d.key, pct:d.pct})),
    at: new Date().toISOString()
  };
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(rec)); }catch(e){}
  return rec;
}

/* ダウンロード共通処理 */
function downloadBlob(blob, name){
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = name;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 3000);
}

/* 角丸矩形（canvas.roundRect 非対応環境のための自前パス） */
function rRect(ctx,x,y,w,h,r){
  r = Math.min(r, h/2, w/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

/* Instagram 導線（簡易カメラアイコン＋@ハンドル。既存の描画を踏襲） */
function drawInstagramLink(x, W){
  const igText = '@onkouchishin';
  const igFont = '500 30px "Zen Maru Gothic", sans-serif';
  x.font = igFont;
  const igTextWidth = x.measureText(igText).width;
  const igIconSize = 32, igGap = 12;
  const igTotalWidth = igIconSize + igGap + igTextWidth;
  const igBaseline = 1852;
  const iconTop = igBaseline - igIconSize + 7;
  const iconLeft = W/2 - igTotalWidth/2;
  x.save();
  x.strokeStyle = '#ff5a36'; x.lineWidth = 2.4; x.lineJoin = 'round';
  const r = 9;
  x.beginPath();
  x.moveTo(iconLeft+r, iconTop);
  x.arcTo(iconLeft+igIconSize, iconTop, iconLeft+igIconSize, iconTop+igIconSize, r);
  x.arcTo(iconLeft+igIconSize, iconTop+igIconSize, iconLeft, iconTop+igIconSize, r);
  x.arcTo(iconLeft, iconTop+igIconSize, iconLeft, iconTop, r);
  x.arcTo(iconLeft, iconTop, iconLeft+igIconSize, iconTop, r);
  x.closePath(); x.stroke();
  x.beginPath();
  x.arc(iconLeft+igIconSize/2, iconTop+igIconSize/2+1, 7.5, 0, Math.PI*2); x.stroke();
  x.fillStyle = '#ff5a36';
  x.beginPath();
  x.arc(iconLeft+igIconSize-8, iconTop+7, 2.2, 0, Math.PI*2); x.fill();
  x.restore();
  x.textAlign = 'left'; x.fillStyle = '#7a6f5c'; x.font = igFont;
  x.fillText(igText, iconLeft+igIconSize+igGap, igBaseline);
  x.textAlign = 'center';
}

/* ---------- シェア画像生成（1080×1920・canvas手描画） ---------- */
async function buildResultCanvas(){
  const t = TYPES[lastResultType];
  const dist = resultDist();

  try{
    await Promise.all([
      document.fonts.load('700 260px "Shippori Mincho"'),
      document.fonts.load('700 96px "Shippori Mincho"'),
      document.fonts.load('700 40px "Shippori Mincho"'),
      document.fonts.load('500 40px "Zen Maru Gothic"')
    ]);
  }catch(e){ /* Font Loading API 非対応環境ではそのまま進む */ }

  const W = 1080, H = 1920;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const x = c.getContext('2d');

  /* 白ベースの背景＋ドット＋朱の枠 */
  x.fillStyle = '#ffffff'; x.fillRect(0,0,W,H);
  x.fillStyle = 'rgba(43,36,29,.045)';
  for(let yy=22; yy<H; yy+=44){
    for(let xx=((yy/44)%2 ? 22 : 44); xx<W; xx+=44){
      x.beginPath(); x.arc(xx,yy,2.6,0,Math.PI*2); x.fill();
    }
  }
  x.strokeStyle = '#ff5a36'; x.lineWidth = 5;
  x.strokeRect(54,54,W-108,H-108);
  x.textAlign = 'center';

  /* 見出し */
  x.fillStyle = '#7a6f5c';
  x.font = '500 36px "Zen Maru Gothic", sans-serif';
  x.fillText('わ た し の 五 行 タ イ プ', W/2, 232);
  x.strokeStyle = '#dcb051'; x.lineWidth = 3;
  x.beginPath(); x.moveTo(280,258); x.lineTo(800,258); x.stroke();

  /* 落款（タイプ色の円と漢字） */
  const cy = 660, r = 250;
  const ringColors = ['#56a278','#b1552f','#dcb051','#5a96b1'];
  x.setLineDash([14,14]); x.lineWidth = 5;
  ringColors.forEach((rc,i)=>{
    x.strokeStyle = rc;
    x.beginPath(); x.arc(W/2,cy,r+34, (-Math.PI/2)+i*(Math.PI/2), (-Math.PI/2)+(i+1)*(Math.PI/2)); x.stroke();
  });
  x.setLineDash([]);
  x.fillStyle = t.color;
  x.beginPath(); x.arc(W/2,cy,r,0,Math.PI*2); x.fill();
  x.strokeStyle = 'rgba(255,255,255,.4)'; x.lineWidth = 10;
  x.beginPath(); x.arc(W/2,cy,r-16,0,Math.PI*2); x.stroke();
  x.fillStyle = '#fff';
  x.font = '700 250px "Shippori Mincho", serif';
  x.textBaseline = 'middle';
  x.fillText(t.kanji, W/2, cy+16);
  x.textBaseline = 'alphabetic';

  /* キャッチ（二面性コピーを「、」で2行に） */
  x.fillStyle = '#7a6f5c';
  x.font = '500 40px "Zen Maru Gothic", sans-serif';
  const parts = t.catch.split('、');
  x.fillText('— ' + parts[0] + '、', W/2, 1070);
  x.fillText((parts[1]||'') + ' —', W/2, 1132);

  /* タイプ名・キーワード */
  x.fillStyle = '#2b241d';
  x.font = '700 92px "Shippori Mincho", serif';
  x.fillText('あなたは「' + t.name + '」', W/2, 1268);
  x.fillStyle = '#7a6f5c';
  x.font = '500 34px "Zen Maru Gothic", sans-serif';
  x.fillText('キーワード：' + t.kw, W/2, 1340);

  /* ▼ 五行の配分（木・土・金・水 の4本バー。結果画面のバーと同じ値・固定順） */
  x.fillStyle = '#7a6f5c';
  x.font = '500 32px "Zen Maru Gothic", sans-serif';
  x.fillText('五 行 の 配 分', W/2, 1416);

  const kanjiX = 300, trackLeft = 355, trackW = 380, pctLeft = trackLeft + trackW + 20;
  const rowTop = 1466, rowGap = 50, bh = 18, rr = bh/2;
  dist.forEach((d,i)=>{
    const y = rowTop + i*rowGap;
    x.textAlign = 'center';
    x.fillStyle = d.color;
    x.font = '700 34px "Shippori Mincho", serif';
    x.fillText(d.kanji, kanjiX, y+12);
    x.fillStyle = '#f1dcc3';
    rRect(x, trackLeft, y-bh/2, trackW, bh, rr); x.fill();
    x.fillStyle = d.color;
    rRect(x, trackLeft, y-bh/2, Math.max(bh, trackW*d.pct/100), bh, rr); x.fill();
    x.textAlign = 'left';
    x.fillStyle = '#2b241d';
    x.font = '700 30px "Zen Maru Gothic", sans-serif';
    x.fillText(d.pct + '%', pctLeft, y+10);
  });
  x.textAlign = 'center';

  /* フッター（既存の座標を踏襲） */
  x.fillStyle = '#ff5a36';
  x.font = '500 34px "Zen Maru Gothic", sans-serif';
  x.fillText('#わたしの五行タイプ', W/2, 1690);
  x.fillStyle = '#2b241d';
  x.font = '600 46px "Shippori Mincho", serif';
  x.fillText('温 考 知 身', W/2, 1766);
  x.fillStyle = '#7a6f5c';
  x.font = '500 26px "Zen Maru Gothic", sans-serif';
  x.fillText('温もりと知恵を、暮らしに。', W/2, 1808);

  drawInstagramLink(x, W);

  const blob = await new Promise(res=>c.toBlob(res,'image/png'));
  const file = blob ? new File([blob], 'watashi-no-gogyo-type.png', {type:'image/png'}) : null;
  return { canvas:c, blob, file };
}

/* ---------- 画像をシェア（対応環境ではLINE/Instagram/X等の共有シートへ） ---------- */
async function shareResultImage(){
  if(!lastResultType) return;
  persistResult();
  let built;
  try{ built = await buildResultCanvas(); }catch(e){ toast('画像を作れませんでした'); return; }
  if(!built.blob) return;
  if(navigator.canShare && built.file && navigator.canShare({files:[built.file]})){
    try{
      await navigator.share({ files:[built.file], text: resultShareText(), url: SHARE_URL });
      return;
    }catch(e){ if(e && e.name==='AbortError') return; }
  }
  downloadBlob(built.blob, 'watashi-no-gogyo-type.png');
  toast('画像を保存しました');
}

/* ---------- 画像をこの端末に保存（ダウンロード固定） ---------- */
async function saveResultImage(){
  if(!lastResultType) return;
  persistResult();
  let built;
  try{ built = await buildResultCanvas(); }catch(e){ toast('画像を作れませんでした'); return; }
  if(!built.blob) return;
  downloadBlob(built.blob, 'watashi-no-gogyo-type.png');
  toast('画像を保存しました');
}

/* ---------- LINE：対応環境では画像そのものを送信、非対応ならリンク＋プレビュー ---------- */
async function shareToLine(){
  if(!lastResultType) return;
  persistResult();
  try{
    const { file } = await buildResultCanvas();
    if(navigator.canShare && file && navigator.canShare({files:[file]})){
      try{ await navigator.share({ files:[file], text: resultShareText(), url: SHARE_URL }); return; }
      catch(e){ if(e && e.name==='AbortError') return; }
    }
  }catch(e){ /* 画像生成に失敗してもリンク共有へ進む */ }
  /* フォールバック：LINEの共有画面。リンクのプレビュー（OGP画像）が表示されます */
  const payload = resultShareText() + '\n' + SHARE_URL;
  window.open('https://line.me/R/share?text=' + encodeURIComponent(payload), '_blank', 'noopener');
}

/* ---------- X：テキスト＋配分＋リンクで投稿画面をひらく ---------- */
function shareToX(){
  const u = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(resultShareText() + '\n') +
            '&url=' + encodeURIComponent(SHARE_URL);
  window.open(u, '_blank', 'noopener');
}

/* ---------- Instagram：画像投稿のため、共有シート or 画像保存＋文章コピー ---------- */
async function shareToInstagram(){
  if(!lastResultType) return;
  persistResult();
  let built;
  try{ built = await buildResultCanvas(); }catch(e){ toast('画像を作れませんでした'); return; }
  if(!built.blob) return;
  if(navigator.canShare && built.file && navigator.canShare({files:[built.file]})){
    try{ await navigator.share({ files:[built.file], text: resultShareText() }); return; }
    catch(e){ if(e && e.name==='AbortError') return; }
  }
  /* 非対応環境（PC等）：画像を保存し、キャプションをコピー。Instagramに貼り付けて投稿できます */
  downloadBlob(built.blob, 'watashi-no-gogyo-type.png');
  const cap = resultShareText() + '\n@onkouchishin';
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(cap)
      .then(()=>toast('画像を保存し、文章をコピーしました'))
      .catch(()=>toast('画像を保存しました'));
  }else{
    toast('画像を保存しました');
  }
}

/* ---------- 配分を控える：テキストの記録をコピー＋この端末に保存 ---------- */
function copyResultRecord(){
  if(!lastResultType){ toast('先に診断をしてください'); return; }
  persistResult();
  const t = TYPES[lastResultType];
  const d = new Date();
  const ymd = d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
  const rec = `わたしの五行タイプ（${ymd}）\nタイプ：${t.name}\n配分：${distLine(resultDist())}\n${SHARE_HASHTAG}\n${SHARE_URL}`;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(rec)
      .then(()=>toast('配分を控えました（コピー済み）'))
      .catch(()=>toast('コピーできませんでした'));
  }else{
    toast('お使いの環境ではコピーに対応していません');
  }
}

renderStart();
showFinderHome();

<script>
/* ============================================================
   FX layer（v7）— 演出専用の追加スクリプト
   ・上のスクリプトの中身（データ／ロジック／文言）は無変更
   ・一部の描画関数を「上書き」して演出を差し込んでいます
     （answer / renderReveal / renderResult / showTypeProfile / startQuiz）
   ・prefers-reduced-motion では演出をすべて省略します
   ============================================================ */
(function(){
'use strict';
const RM = window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- 気配のレイヤー（背景＝煙／前面＝火の粉） ---------- */
const KI = (function(){
  if(RM) return {tint(){}, burst(){}};
  const bg = document.createElement('canvas'); bg.id = 'fx-ki';
  const tp = document.createElement('canvas'); tp.id = 'fx-ki-top';
  document.body.prepend(bg); document.body.appendChild(tp);
  const bx = bg.getContext('2d'), tx = tp.getContext('2d');
  let W, H;
  function size(){
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    [bg, tp].forEach(c=>{ c.width = W*DPR; c.height = H*DPR; });
    bx.setTransform(1,0,0,1,0,0); bx.scale(bg.width/W, bg.height/H);
    tx.setTransform(1,0,0,1,0,0); tx.scale(tp.width/W, tp.height/H);
  }
  size(); addEventListener('resize', size);

  const PAL = ['#56a278','#b1552f','#dcb051','#5a96b1'];
  let tintCol = null;
  const P = [], S = [];
  function hexA(h,a){
    const r=parseInt(h.slice(1,3),16), g=parseInt(h.slice(3,5),16), b=parseInt(h.slice(5,7),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }
  function spawn(init){
    const col = (tintCol && Math.random()<.65) ? tintCol : PAL[(Math.random()*PAL.length)|0];
    P.push({
      x: Math.random()*W,
      y: init ? Math.random()*H : H + 90,
      r: 26 + Math.random()*46,
      a: .03 + Math.random()*.05,
      v: .1 + Math.random()*.2,
      ph: Math.random()*6.283,
      sw: .2 + Math.random()*.5,
      col
    });
  }
  for(let i=0;i<22;i++) spawn(true);

  let last = 0, run = !document.hidden;
  document.addEventListener('visibilitychange', ()=>{
    const was = run; run = !document.hidden;
    if(run && !was){ last = 0; requestAnimationFrame(loop); }
  });
  function loop(ts){
    if(!run) return;
    const dt = last ? Math.min(40, ts - last) : 16; last = ts;
    bx.clearRect(0,0,W,H);
    for(let i=P.length-1;i>=0;i--){
      const p = P[i];
      p.y -= p.v*dt*.06;
      p.ph += dt*.0004*p.sw;
      const x = p.x + Math.sin(p.ph*3)*26;
      if(p.y < -p.r){ P.splice(i,1); spawn(false); continue; }
      const g = bx.createRadialGradient(x,p.y,0,x,p.y,p.r);
      g.addColorStop(0, hexA(p.col, p.a));
      g.addColorStop(1, hexA(p.col, 0));
      bx.fillStyle = g;
      bx.beginPath(); bx.arc(x,p.y,p.r,0,6.283); bx.fill();
    }
    tx.clearRect(0,0,W,H);
    for(let i=S.length-1;i>=0;i--){
      const s = S[i];
      s.x += s.vx*dt*.06; s.y += s.vy*dt*.06;
      s.vy += dt*.0015; s.l -= dt;
      if(s.l <= 0){ S.splice(i,1); continue; }
      tx.globalAlpha = Math.max(0, s.l/s.L);
      tx.fillStyle = s.col;
      tx.beginPath(); tx.arc(s.x,s.y,s.r,0,6.283); tx.fill();
    }
    tx.globalAlpha = 1;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  return {
    tint(c){ tintCol = c; },
    burst(x,y,col){
      for(let i=0;i<32;i++){
        const a = Math.random()*6.283, sp = 1.2 + Math.random()*3.4;
        const L = 650 + Math.random()*550;
        S.push({
          x, y,
          vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 1.7,
          r: 1.6 + Math.random()*2.6,
          col: Math.random()<.7 ? col : '#ffb26b',
          L, l: L
        });
      }
    }
  };
})();

/* ---------- ヘッダー：見出しがひと文字ずつ現れる ---------- */
(function(){
  const wrap = document.querySelector('.wrap');
  if(!wrap || RM) return;
  const h1 = wrap.querySelector('h1');
  if(h1){
    let i = 0;
    [...h1.childNodes].forEach(node=>{
      if(node.nodeType === 3){
        const frag = document.createDocumentFragment();
        for(const ch of node.textContent){
          const s = document.createElement('span');
          s.className = 'fx-ch'; s.textContent = ch;
          s.style.animationDelay = (0.22 + i*0.045) + 's';
          frag.appendChild(s); i++;
        }
        node.replaceWith(frag);
      }
    });
  }
  wrap.classList.add('fx-intro');
})();

/* ---------- 立ち上がりの時間差（--fxi）＋ ツボカードのスクロール表示 ---------- */
const io = ('IntersectionObserver' in window) ? new IntersectionObserver(es=>{
  es.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } });
},{threshold:.08}) : null;

function fxDecorate(root){
  root.querySelectorAll('.q-opts,.gogyo-list,.sym-grid,.type-grid').forEach(g=>{
    [...g.children].forEach((c,i)=>c.style.setProperty('--fxi', i));
  });
  if(!RM && io){
    root.querySelectorAll('.p-list .p-card').forEach(pc=>{
      if(!pc.classList.contains('fx-io') && !pc.closest('#sheet-body')){
        pc.classList.add('fx-io'); io.observe(pc);
      }
    });
  }
}
['shindan-stage','finder-stage','sheet-body'].forEach(id=>{
  const st = document.getElementById(id);
  if(!st) return;
  fxDecorate(st);
  new MutationObserver(()=>fxDecorate(st)).observe(st,{childList:true,subtree:false});
});

/* ---------- タップの波紋 ---------- */
document.addEventListener('pointerdown', e=>{
  if(RM) return;
  const b = e.target.closest('.q-opts button,.btn,.gl-row,.sym-grid button,.type-grid button,.res-points button');
  if(!b) return;
  const r = b.getBoundingClientRect();
  const d = Math.max(r.width, r.height) * 2;
  const s = document.createElement('span');
  s.className = 'fx-ripple';
  s.style.width = s.style.height = d + 'px';
  s.style.left = (e.clientX - r.left - d/2) + 'px';
  s.style.top  = (e.clientY - r.top  - d/2) + 'px';
  b.appendChild(s);
  setTimeout(()=>s.remove(), 560);
});

/* ---------- 回答：選んだ手ごたえ → ひと呼吸おいて次へ ---------- */
window.answer = function(v){
  const card = document.querySelector('#shindan-stage .card');
  if(card && card.dataset.fxLock) return;   /* 連打ガード */
  PICK[qIndex] = v;
  if(RM){ nextItem(); return; }
  if(card) card.dataset.fxLock = '1';
  const ev = window.event;
  const btn = (ev && ev.target) ? ev.target.closest('button') : null;
  if(btn) btn.classList.add('picked');
  if(navigator.vibrate){ try{ navigator.vibrate(10); }catch(_){} }
  setTimeout(()=>{
    if(card) card.classList.add('fx-out');
    setTimeout(nextItem, 140);
  }, 200);
};

/* ---------- 結果前の演出：巡りが加速して、ひとつに収束する ---------- */
window.renderReveal = function(){
  const sc = calcScores();
  const topKey = Object.keys(sc).sort((a,b)=>sc[b]-sc[a])[0];
  const tcol = TYPES[topKey].color;
  if(RM){
    $('#shindan-stage').innerHTML =
      '<div class="card reveal"><p class="rv-text">いまの巡りを、読んでいます……</p></div>';
    toTop();
    setTimeout(renderResult, 600);
    return;
  }
  const dots = ['moku','tsuchi','kin','mizu'].map(k=>
    '<span class="fx-dot" style="background:'+TYPES[k].color+'">'+TYPES[k].kanji+'</span>'
  ).join('');
  $('#shindan-stage').innerHTML =
    '<div class="card fade-in reveal">'+
      '<div class="fx-orbit" id="fx-orbit">'+dots+'<span class="rv-core" id="fx-core">巡</span></div>'+
      '<p class="rv-text">いまの巡りを、読んでいます……</p>'+
    '</div>';
  toTop();

  const orbit = $('#fx-orbit'), core = $('#fx-core');
  const els = [...orbit.querySelectorAll('.fx-dot')];
  const T0 = performance.now(), DUR = 3200;
  const ease = x => x<=0 ? 0 : x>=1 ? 1 : x*x*(3-2*x);
  let done = false;

  function frame(now){
    if(done) return;
    const el = now - T0;
    /* 回転：ゆっくり始まり、終盤に向けて加速 */
    const spin = el*.0012 + Math.pow(Math.max(0,(el-1200))/1000, 2) * 2.2;
    /* 半径：1.4秒からゆっくり中心へ */
    const rad = 70 * (1 - ease((el-1400)/1600));
    els.forEach((d,i)=>{
      const a = spin + i * Math.PI/2;
      d.style.transform = 'translate('+(Math.cos(a)*rad).toFixed(1)+'px,'+(Math.sin(a)*rad).toFixed(1)+'px)';
      if(el > 200 + i*140) d.style.opacity = 1;
    });
    core.style.transform = 'scale('+(1 + ease((el-1800)/1400)*.45)+') rotate('+(-el*.02)+'deg)';
    if(el < DUR){ requestAnimationFrame(frame); }
    else{ done = true; finale(); }
  }
  requestAnimationFrame(frame);

  function finale(){
    /* 結果画面へは、まず素早くフェードしてから切り替える。
       （フラッシュ／火の粉は、印が着地する瞬間に合わせて
       renderResult側で正しい位置に出す） */
    const card = orbit.closest('.card');
    if(card){ card.style.transition = 'opacity .18s ease'; card.style.opacity = '0'; }
    setTimeout(renderResult, 190);
  }
};

/* ---------- 結果：押印の儀式 ＋ 段階的な立ち上がり ---------- */
function fxCascade(card, base){
  card.classList.add('fx-cascade');
  [...card.children].forEach((c,i)=>{ c.style.animationDelay = (base + i*0.07).toFixed(2) + 's'; });
}
function fxStampSeal(card){
  card.classList.add('fx-stamp');
  const seal = card.querySelector('.seal');
  if(!seal) return null;
  seal.style.animationDelay = '0s';
  const ink = document.createElement('span');
  ink.className = 'fx-ink';
  ink.style.color = getComputedStyle(seal).backgroundColor;
  seal.appendChild(ink);
  /* 印はタップで押し直せる（火の粉つき） */
  seal.addEventListener('click', ()=>{
    if(RM) return;
    seal.style.animation = 'none';
    void seal.offsetWidth;
    seal.style.animation = '';
    const r = seal.getBoundingClientRect();
    KI.burst(r.left + r.width/2, r.top + r.height/2, ink.style.color);
    if(navigator.vibrate){ try{ navigator.vibrate(10); }catch(_){} }
  });
  return seal;
}
function fxCountUp(card){
  card.querySelectorAll('.res-bars .v').forEach(el=>{
    const target = parseInt(el.textContent, 10) || 0;
    const t0 = performance.now();
    (function f(n){
      const p = Math.min(1, (n - t0)/900);
      el.textContent = Math.round(target * (p*(2-p))) + '%';
      if(p < 1) requestAnimationFrame(f);
    })(t0);
  });
}
const _renderResult = window.renderResult;
window.renderResult = function(){
  _renderResult();
  const card = $('#shindan-stage .card');
  if(!card) return;
  KI.tint(TYPES[lastResultType].color);
  const shareBtn = card.querySelector('.res-share .btn');
  if(shareBtn) shareBtn.classList.add('fx-shine');
  if(RM) return;
  fxCascade(card, 0.25);
  const seal = fxStampSeal(card);
  if(seal){
    setTimeout(()=>{
      const r = seal.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const col = TYPES[lastResultType].color;
      KI.burst(cx, cy, col);
      /* 印が着地する瞬間だけ、その場にふわっと光をともす
         （すでに見えている文字の上に薄く重なるだけなので、隠れない） */
      const f = document.createElement('div');
      f.className = 'fx-flash on';
      f.style.background =
        'radial-gradient(circle at '+cx+'px '+cy+'px, #fff 0%, '+col+'4d 22%, transparent 52%)';
      document.body.appendChild(f);
      setTimeout(()=>f.remove(), 700);
    }, 420);
  }
  /* スコアバーの伸びと％のカウントアップは、
     カスケードで見えるタイミングに合わせて再生する */
  setTimeout(()=>{
    card.querySelectorAll('.res-bars i').forEach(el=>{
      el.style.transition = 'none';
      el.style.width = '0%';
      void el.offsetWidth;
      el.style.transition = '';
      el.style.width = el.dataset.w + '%';
    });
    fxCountUp(card);
  }, 620);

  /* iOS Safari 対策：入場アニメが描画されず、要素が透明（opacity:0）のまま
     残ることがあるため、必ず表示させる安全網。
     ・落款アイコン（.seal）は早めに単独で復帰させる
     ・入場が終わる頃に .fx-cascade を外し、全要素を通常の表示状態へ戻す
     （押印のやり直し演出＝.fx-stamp は残すので、タップ再押印は引き続き動作） */
  if(seal){ setTimeout(()=>{ seal.style.opacity = '1'; }, 800); }
  const revealDelay = 250 + (card.children.length - 1) * 70 + 600 + 200;
  setTimeout(()=>{
    card.classList.remove('fx-cascade');
    [...card.children].forEach(c=>{ c.style.animationDelay = ''; });
  }, revealDelay);
};

/* ---------- タイプ解説ページにも、軽い押印と立ち上がりを ---------- */
const _showTypeProfile = window.showTypeProfile;
window.showTypeProfile = function(key){
  _showTypeProfile(key);
  if(RM) return;
  const card = $('#shindan-stage .card');
  if(!card) return;
  fxCascade(card, 0.1);
  fxStampSeal(card);
};

/* ---------- 診断をやり直すときは、気配をいったん元にもどす ---------- */
const _startQuiz = window.startQuiz;
window.startQuiz = function(){
  KI.tint(null);
  _startQuiz();
};
})();
